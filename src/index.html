<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>CodeLve</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="ui/main-layout.css">
  <link rel="stylesheet" href="chat/chat-panel.css">
  
  <style>
    /* Base styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    
    body {
      background-color: #f8f9fa;
      color: #212529;
    }
    
    #app {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      height: 40px;
      background-color: #0078d4;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      -webkit-app-region: drag;
    }
    
    .header-title {
      font-weight: 600;
      flex: 1;
    }
    
    .header-controls {
      display: flex;
      -webkit-app-region: no-drag;
    }
    
    .header-button {
      background: none;
      border: none;
      color: white;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      font-size: 1.2rem;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }
    
    .header-button:hover {
      opacity: 1;
    }
    
    .main-content {
      flex: 1;
      position: relative;
    }
    
    .status-bar {
      height: 24px;
      background-color: #e9ecef;
      color: #6c757d;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      font-size: 0.75rem;
    }
    
    .status-item {
      margin-right: 1rem;
      display: flex;
      align-items: center;
    }
    
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    
    .status-indicator.online {
      background-color: #28a745;
    }
    
    .status-indicator.offline {
      background-color: #dc3545;
    }
    
    .status-indicator.loading {
      background-color: #ffc107;
    }
    
    .error-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #f8d7da;
      color: #721c24;
      padding: 1rem;
      border-radius: 0.25rem;
      border: 1px solid #f5c6cb;
      max-width: 80%;
      text-align: center;
    }
    
    /* Dark theme */
    body.theme-dark {
      background-color: #1e1e1e;
      color: #e9ecef;
    }
    
    body.theme-dark .header {
      background-color: #0062ad;
    }
    
    body.theme-dark .status-bar {
      background-color: #252526;
      color: #adb5bd;
    }
    
    body.theme-dark .error-message {
      background-color: #4b1c1c;
      color: #f8d7da;
      border-color: #742a2a;
    }
  </style>
</head>
<body>
  <!-- Application Header -->
  <header class="header">
    <div class="header-title">CodeLve</div>
    <div class="header-controls">
      <button id="settings-button" class="header-button" title="Settings">⚙️</button>
      <button id="minimize-button" class="header-button" title="Minimize">_</button>
      <button id="maximize-button" class="header-button" title="Maximize">□</button>
      <button id="close-button" class="header-button" title="Close">×</button>
    </div>
  </header>
  
  <!-- Main Content Area -->
  <main id="app" class="main-content">
    <!-- Main Layout will be inserted here by JavaScript -->
  </main>
  
  <!-- Status Bar -->
  <footer class="status-bar">
    <div class="status-item">
      <div id="ai-status-indicator" class="status-indicator loading"></div>
      <span id="ai-status-text">Initializing AI service...</span>
    </div>
    <div class="status-item">
      <div id="ide-status-indicator" class="status-indicator loading"></div>
      <span id="ide-status-text">Initializing IDE...</span>
    </div>
  </footer>
  
  <!-- Scripts -->
  <script src="renderer.js"></script>
  <script>
    // Window control handlers
    document.getElementById('minimize-button').addEventListener('click', () => {
      window.api.minimizeWindow();
    });
    
    document.getElementById('maximize-button').addEventListener('click', () => {
      window.api.maximizeWindow();
    });
    
    document.getElementById('close-button').addEventListener('click', () => {
      window.api.closeWindow();
    });
    
    document.getElementById('settings-button').addEventListener('click', () => {
      // Will implement settings panel later
      console.log('Settings button clicked');
    });
  </script>
</body>

</html>
